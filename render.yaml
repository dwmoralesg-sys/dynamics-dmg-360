databases:
  - name: dynamics-dmg-360-db
    plan: free
    region: oregon
    databaseName: dynamics_dmg_360
    user: dynamics_dmg_360

services:
  - type: web
    name: dynamics-dmg-360-api
    runtime: node
    plan: free
    region: oregon
    rootDir: backend
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm run prisma:deploy && npm run db:seed && npm run start:prod
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: dynamics-dmg-360-db
          property: connectionString
      - key: FRONTEND_URL
        value: https://dynamics-dmg-360.vercel.app
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 1d
      - key: ANALYTICS_IP_SALT
        generateValue: true
      - key: SEED_ADMIN_EMAIL
        value: dwmoralesg@gmail.com
      - key: SEED_ADMIN_PASSWORD
        sync: false
      - key: SEED_ADMIN_NOMBRE
        value: Administrador DMG
